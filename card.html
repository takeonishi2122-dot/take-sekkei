<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Take設計 名刺案</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="card-page">
    <main class="card-stage" aria-label="Take設計 名刺プレビュー">
      <section class="business-card front" aria-label="名刺 表面">
        <div class="card-brand">
          <span class="card-mark">竹</span>
          <span>Take設計</span>
        </div>
        <div class="card-main">
          <p class="card-title">耐震・耐水化AI設計</p>
          <p class="card-subtitle">上下水道施設・環状施設の耐震対策</p>
        </div>
        <div class="card-footer">
          <div>
            <p>構造設計一級建築士</p>
            <p>設備設計一級建築士</p>
          </div>
          <div class="card-person">
            <p>大西 武志</p>
            <p>take.design2122@gmail.com</p>
          </div>
        </div>
      </section>

      <section class="business-card back" aria-label="名刺 裏面">
        <p class="back-copy">
          上下水道施設・環状施設の耐震・耐水化対策を、構造設計と設備設計の両面から支援します。
        </p>
        <div class="back-bottom">
          <div class="qr-placeholder" aria-label="QRコード予定位置">QR</div>
          <div>
            <p class="web-label">Take設計 Web</p>
            <p class="web-url">www.take-sekkei.jp</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
